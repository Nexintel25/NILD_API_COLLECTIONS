info:
  name: All Bills
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/management/billing/bills?page=1&limit=15&bill_type=all&payment_status=all&startDate={{startDate}}&endDate={{endDate}}"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "15"
      type: query
    - name: bill_type
      value: all
      type: query
    - name: payment_status
      value: all
      type: query
    - name: startDate
      value: "{{startDate}}"
      type: query
    - name: endDate
      value: "{{endDate}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Master bill list with filters.
