info:
  name: Concession Report
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/management/billing/concessions?page=1&limit=15&bill_type=all&startDate={{startDate}}&endDate={{endDate}}"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "15"
      type: query
    - name: bill_type
      value: all
      type: query
    - name: startDate
      value: "{{startDate}}"
      type: query
    - name: endDate
      value: "{{endDate}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Audit list for all bills with concessions.
