info:
  name: All Transactions
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/management/billing/transactions?page=1&limit=20&payment_mode=all&bill_type=all&startDate={{startDate}}&endDate={{endDate}}"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: payment_mode
      value: all
      type: query
    - name: bill_type
      value: all
      type: query
    - name: startDate
      value: "{{startDate}}"
      type: query
    - name: endDate
      value: "{{endDate}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: All payment records with bill/patient linkage.
