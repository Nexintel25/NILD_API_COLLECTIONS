info:
  name: Overview
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/management/billing/overview?startDate={{startDate}}&endDate={{endDate}}"
  params:
    - name: startDate
      value: "{{startDate}}"
      type: query
    - name: endDate
      value: "{{endDate}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Revenue dashboard snapshot across bills and pharmacy sales.
