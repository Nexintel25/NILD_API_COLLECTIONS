info:
  name: Collection Summary
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/management/billing/collection-summary?startDate={{startDate}}&endDate={{endDate}}"
  params:
    - name: startDate
      value: "{{startDate}}"
      type: query
    - name: endDate
      value: "{{endDate}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Collection totals by payment mode including pharmacy.
