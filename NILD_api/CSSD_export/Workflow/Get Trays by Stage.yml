info:
  name: Get Trays by Stage
  type: http
  seq: 1

http:
  method: GET
  url: http://192.168.1.112:5000/api/cssd/workflow?stage=received
  headers:
    - name: Authorization
      value: Bearer YOUR_BEARER_TOKEN
  params:
    - name: stage
      value: received
      type: query
      description: received | washing | ready_for_packing | packing | sterilizing | sterile | dispatched
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
