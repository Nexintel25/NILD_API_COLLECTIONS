info:
  name: Incident Reports
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8080/api/cssd/data-entry/incidents?page=1&limit=10
  headers:
    - name: Authorization
      value: Bearer YOUR_AUTH_TOKEN
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
