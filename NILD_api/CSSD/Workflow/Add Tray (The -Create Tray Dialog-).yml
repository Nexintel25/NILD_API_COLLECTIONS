    data: |-
      {
        "name": "General Surgery Set",
        "setNumber": "SET-001",
        "type": "General",
        "department": "Main OT",
        "itemsCount": "12",
        "sterilizationTemp": "134.2",
        "pressure": "2.15",
        "timeDuration": "45 mins",
        "machineNumber": "AC-01",
        "priority": "Normal",
        "notes": "Handle with care",
        "instruments": ["Mayo Scissors", "Metzenbaum Scissors", "Debakey Forceps"]
      }
