info:
  name: Get Clean Zone Trays (Assembly Station)
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/cssd/workflow?stage=ready_for_packing
  headers:
    - name: Authorization
      value: Bearer TOKEN
  params:
    - name: stage
      value: ready_for_packing
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
