info:
  name: Get Dirty Zone Trays (Decontamination Queue)
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3000/api/cssd/workflow?stage=received
  headers:
    - name: Authorization
      value: Bearer TOKEN
  params:
    - name: stage
      value: received
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
