info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5000/api/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "tenant_id": 1,
          "identifier": "dietician_user",
          "password": "Admin@123"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
